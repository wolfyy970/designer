lbl p { margin: 6px 0 0; color: var(--ink-2); font-family: var(--sans); font-size: 12px; letter-spacing:0; text-transform: none; line-height: 1.5; }\n\n/* Row for showing several states of one thing */\n.row { display:flex; flex-wrap:wrap; gap:20px; align-items: flex-start; }\n.state { display:flex; flex-direction:column; gap:8px; }\n.state .tag { font-family: var(--mono); font-size: 9px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--ink-4); }\n\n/* ——————————————————————————— NODE SHELL ——————————————————————————— */\n.node {\n  position: relative;\n  width: 320px;\n  background: var(--raised);\n  border: 1px solid var(--rule);\n  border-radius: 8px;\n  box-shadow: 0 1px 2px rgba(0,0,0,0.04);\n  font-size: 12px;\n}\n.node.w-variant { width: 480px; }\n.node.empty { border-style: dashed; }\n.node.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 1px 2px rgba(0,0,0,0.04); }\n.node.processing { border-color: color-mix(in srgb, var(--accent) 55%, transparent); animation: pulse 1.6s ease-in-out infinite; }\n.node.error { border-color: color-mix(in srgb, var(--error) 50%, transparent); }\n.node.dimmed { opacity: 0.75; border-color: color-mix(in srgb, var(--rule) 50%, transparent); }\n.node.filled-rail { border-left-width: 2px; border-left-color: var(--success); }\n.node.warn-rail { border-left-width: 2px; border-left-color: var(--warning); }\n@keyframes pulse { 0%,100% {opacity:1;} 50%{opacity:.8;} }\n\n/* Handles */\n.handle { position: absolute; top: 50%; width:12px; height:12px; background: var(--raised); border: 2px solid var(--success); border-radius: 50%; transform: translateY(-50%); }\n.handle.amber { border-color: var(--warning); }\n.handle.t { left: -6px; }\n.handle.s { right: -6px; }\n.handle.diamond { border-radius: 2px; transform: translateY(-50%) rotate(45deg); }\n.handle.pulse::after { content:''; position:absolute; inset:-4px; border: 2px solid var(--warning); border-radius: 50%; opacity:.4; animation: breathe 1.8s ease-out infinite; }\n.handle.pulse.diamond::after { border-radius:2px; }\n@keyframes breathe { 0%,100%{opacity:0;} 50%{opacity:.55;} }\n\n/* Header */\n.n-head { padding: 10px 12px 8px; border-bottom: 1px solid var(--rule-soft); }\n.n-head .tr { display:flex; align-items:center; gap:8px; }\n.n-head h3 { margin:0; flex:1; font-size: 12.5px; font-weight: 600; color: var(--ink); }\n.n-head .opt { font-size: 10px; color: var(--ink-4); }\n.n-head .xbtn { background:none; border:0; color: var(--ink-4); cursor:pointer; font-size:12px; line-height:1; padding:2px; }\n.n-head p.desc { margin: 2px 0 0; font-size: 11px; color: var(--ink-3); font-style: italic; line-height:1.4; }\n\n/* Body */\n.n-body { padding: 8px 12px 12px; }\n.n-body .ta { border:1px solid var(--rule); background: #fff; border-radius: 4px; padding: 7px 10px; font-size: 11.5px; color: var(--ink); line-height: 1.55; min-height: 90px; }\n.n-body .ta.empty { color: var(--ink-4); font-style: italic; }\n.n-body .ta.focused { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }\n\n/* Icon button (wand, etc.) */\n.ibtn { display:inline-flex; align-items:center; gap:5px; border:1px solid var(--rule); background: var(--raised); border-radius: 6px; padding: 5px 9px; font-size: 11px; color: var(--ink-2); cursor: pointer; }\n.ibtn:hover { border-color: var(--accent); color: var(--ink); }\n.ibtn .ic { color: var(--accent); }\n.ibtn[disabled] { opacity: .45; cursor: not-allowed; }\n.ibtn.primary { background: var(--accent); color: #ffffff; border-color: var(--accent); width:100%; justify-content:center; padding: 8px 12px; font-weight: 500; font-size: 12px; }\n.ibtn.primary .ic { color: #ffffff; }\n.ibtn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }\n.ibtn.primary[disabled] { opacity: .5; background: var(--accent); border-color: var(--accent); }\n\n/* Chip */\n.chip { display:inline-flex; align-items:center; gap:6px; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-family: var(--mono); letter-spacing: .4px; }\n.chip.warn { background: var(--warning-soft); color: var(--warning); border: 1px solid color-mix(in srgb, var(--warning) 35%, transparent); }\n.chip.ok { background: var(--success-soft); color: var(--success); border: 1px solid color-mix(in srgb, var(--success) 35%, transparent); }\n.chip.accent { background: color-mix(in srgb, var(--accent) 12%, var(--raised)); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }\n.chip.neutral { background: var(--surface); color: var(--ink-3); border: 1px solid var(--rule-soft); }\n\n/* Scorecard */\n.sc { border-top:1px solid var(--rule-soft); padding: 8px 12px 10px; background: color-mix(in srgb, var(--surface) 50%, transparent); border-radius: 0 0 8px 8px; }\n.sc .head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 6px; }\n.sc .head .lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--ink-4); }\n.sc .head .num { font-family: var(--mono); font-size: 11px; tabular-nums: 1; }\n.sc .head .num.ok { color: var(--success); }\n.sc .head .num.warn { color: var(--warning); }\n.sc .bar { display:grid; grid-template-columns: 110px 1fr 32px; gap: 8px; align-items:center; padding: 3px 0; font-size: 11px; }\n.sc .bar .n { font-size: 11px; color: var(--ink-2); }\n.sc .bar .b { height: 6px; background: var(--rule-soft); border-radius: 2px; overflow:hidden; }\n.sc .bar .b .f { height:100%; }\n.sc .bar .b .f.ok { background: var(--success); }\n.sc .bar .b .f.warn { background: var(--warning); }\n.sc .bar .v { font-family: var(--mono); font-size: 10.5px; text-align:right; }\n.sc .bar .v.ok { color: var(--success); }\n.sc .bar .v.warn { color: var(--warning); }\n\n/* Seg control */\n.seg { display:flex; gap:2px; padding:2px; background: var(--surface); border:1px solid var(--rule); border-radius: 6px; }\n.seg button { flex:1; background: transparent; border:0; padding: 5px 8px; font-size: 11px; color: var(--ink-3); cursor:pointer; border-radius: 4px; }\n.seg button.on { background: var(--ink); color: var(--raised); font-weight:500; }\n\n/* Wire */\n.wire-demo { height: 80px; display:flex; align-items:center; gap:12px; }\n.wire-line { flex:1; height:1px; background: var(--rule); position:relative; }\n.wire-line.active { background: var(--accent); }\n.wire-line.active::before { content:''; position:absolute; left:0; top:-1px; width:24px; height:3px; background: var(--accent); border-radius: 2px; animation: flow 1.4s linear infinite; }\n@keyframes flow { to { transform: translateX(260px); } }\n\n/* Callouts */\n.callout { border-radius: 6px; padding: 8px 10px; font-size: 11px; border: 1px solid; }\n.callout.note { background: var(--surface); border-color: var(--rule-soft); color: var(--ink-2); }\n.callout.err { background: var(--error-soft); border-color: color-mix(in srgb, var(--error) 35%, transparent); color: var(--error); }\n.callout.info { background: color-mix(in srgb, var(--info) 10%, var(--raised)); border-color: color-mix(in srgb, var(--info) 35%, transparent); color: var(--info); }\n\n/* Token swatches */\n.swatches { display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }\n.swatch { border-radius: 6px; overflow: hidden; border: 1px solid var(--rule-soft); background: var(--raised); font-size: 10.5px; }\n.swatch .sq { height: 52px; }\n.swatch .meta { padding: 7px 8px; }\n.swatch .meta strong { display:block; font-size:11px; color: var(--ink); font-weight: 600; }\n.swatch .meta code { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }\n\n/* Anatomy diagram */\n.anatomy { background: var(--surface); border: 1px dashed var(--rule); border-radius: 8px; padding: 16px; font-family: var(--mono); font-size: 11px; color: var(--ink-3); white-space: pre; overflow-x:auto; line-height: 1.4; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n  <h1 class=\"page-title\">Designer <em>·<\u002Fem> Indigo Reference<\u002Fh1>\n  <p class=\"page-sub\">Every atom, molecule, and organism as it should appear after the palette swap. Pixel-accurate to what the coding agent should build. No page chrome, no palette switcher — this is the canonical look. Each section maps to a markdown spec in <code>handoff/<\u002Fcode>.<\u002Fp>\n\n  <!-- ============================================================ -->\n  <!-- TOKENS -->\n  <!-- ============================================================ -->\n  <section class=\"group\">\n    <h2 class=\"group-title\">Tokens<\u002Fh2>\n    <p class=\"group-note\">Every component reads from these role tokens. Never from hex values. See <code>tokens/tokens.md<\u002Fcode>.<\u002Fp>\n    <div class=\"swatches\">\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--accent)\"><\u002Fdiv><div class=\"meta\"><strong>accent<\u002Fstrong><code>#3a5a7d<\u002Fcode><br>brand · selection · focus<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--success)\"><\u002Fdiv><div class=\"meta\"><strong>success<\u002Fstrong><code>#5e8472<\u002Fcode><br>filled · ok state<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--warning)\"><\u002Fdiv><div class=\"meta\"><strong>warning<\u002Fstrong><code>#b58a3a<\u002Fcode><br>empty · needs input<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--error)\"><\u002Fdiv><div class=\"meta\"><strong>error<\u002Fstrong><code>#b8453e<\u002Fcode><br>destructive only<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--info)\"><\u002Fdiv><div class=\"meta\"><strong>info<\u002Fstrong><code>#3d6e8a<\u002Fcode><br>file-css · capture rails<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--ink)\"><\u002Fdiv><div class=\"meta\"><strong>fg<\u002Fstrong><code>#1a1915<\u002Fcode><br>primary ink · \"Design\" btn<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--canvas); border-right:1px solid var(--rule-soft)\"><\u002Fdiv><div class=\"meta\"><strong>bg<\u002Fstrong><code>#f4efe6<\u002Fcode><br>canvas<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--surface); border-right:1px solid var(--rule-soft)\"><\u002Fdiv><div class=\"meta\"><strong>surface<\u002Fstrong><code>#fbf8ef<\u002Fcode><br>paper / sheets<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--raised); border-right:1px solid var(--rule-soft)\"><\u002Fdiv><div class=\"meta\"><strong>surface-raised<\u002Fstrong><code>#ffffff<\u002Fcode><br>cards · inputs<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--rule)\"><\u002Fdiv><div class=\"meta\"><strong>border<\u002Fstrong><code>#cbc2ae<\u002Fcode><br>default border<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--rule-soft)\"><\u002Fdiv><div class=\"meta\"><strong>border-subtle<\u002Fstrong><code>#e3dccb<\u002Fcode><br>internal dividers<\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"sq\" style=\"background:var(--ink-3)\"><\u002Fdiv><div class=\"meta\"><strong>fg-muted<\u002Fstrong><code>#76736a<\u002Fcode><br>secondary text<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================ -->\n  <!-- ATOMS -->\n  <!-- ============================================================ -->\n  <section class=\"group\">\n    <h2 class=\"group-title\">Atoms<\u002Fh2>\n    <p class=\"group-note\">Smallest reusable units. Each is one CSS class or one tiny component; every one maps to a spec in <code>atoms/<\u002Fcode>.<\u002Fp>\n\n    <!-- HANDLE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Handle<\u002Fstrong>\n        <p>Connection point at each side of every node. <b>Green<\u002Fb> ring = this side is satisfied (filled or connected). <b>Amber diamond<\u002Fb> = required input not yet connected. Pulse signals \"needs attention.\"<\u002Fp>\n        <p>→ <code>atoms/handle.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">filled · circle<\u002Fspan>\n          <div style=\"position:relative; width:80px; height:32px; border:1px dashed var(--rule-soft); border-radius:4px;\">\n            <span class=\"handle t\" style=\"left:-6px; top:50%\"><\u002Fspan><span class=\"handle s\" style=\"right:-6px; top:50%\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">empty · diamond<\u002Fspan>\n          <div style=\"position:relative; width:80px; height:32px; border:1px dashed var(--rule-soft); border-radius:4px;\">\n            <span class=\"handle t amber diamond\" style=\"left:-6px; top:50%\"><\u002Fspan><span class=\"handle s amber\" style=\"right:-6px; top:50%\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">empty · diamond · pulse<\u002Fspan>\n          <div style=\"position:relative; width:80px; height:32px; border:1px dashed var(--rule-soft); border-radius:4px;\">\n            <span class=\"handle t amber diamond pulse\" style=\"left:-6px; top:50%\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CHIP -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Chip<\u002Fstrong>\n        <p>Small inline labels. Color encodes role: amber warn, sage ok, indigo accent (for \"current\"), neutral for meta.<\u002Fp>\n        <p>→ <code>atoms/chip.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">warning · \"needs input\"<\u002Fspan><span class=\"chip warn\">needs input<\u002Fspan><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">success · \"filled\"<\u002Fspan><span class=\"chip ok\">filled<\u002Fspan><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">accent · \"current\"<\u002Fspan><span class=\"chip accent\">current<\u002Fspan><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">neutral · \"optional\"<\u002Fspan><span class=\"chip neutral\">optional<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RAIL -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Left-edge rail<\u002Fstrong>\n        <p>A 2px left border in <code>success<\u002Fcode> or <code>warning<\u002Fcode> to reinforce filled/empty at a glance. Applied on Input nodes. Never on a selected or processing node (those states own the border).<\u002Fp>\n        <p>→ <code>atoms/rail.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">filled-rail<\u002Fspan><div class=\"node filled-rail\" style=\"width:200px; height:60px\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">warn-rail (empty required)<\u002Fspan><div class=\"node warn-rail empty\" style=\"width:200px; height:60px\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BUTTON -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Buttons<\u002Fstrong>\n        <p>Two tiers: <b>primary<\u002Fb> (ink fill, used for \"Design\" and \"Generate\") and <b>secondary<\u002Fb> (hairline border, used for wand/rename/download). Primary is <em>never<\u002Fem> brand-colored — it's ink. Brand color is reserved for selection/focus.<\u002Fp>\n        <p>→ <code>atoms/button.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">primary<\u002Fspan><button class=\"ibtn primary\" style=\"width:auto\">Design ⚡<\u002Fbutton><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">primary · disabled<\u002Fspan><button class=\"ibtn primary\" disabled=\"\" style=\"width:auto\">Design ⚡<\u002Fbutton><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">secondary · wand<\u002Fspan><button class=\"ibtn\"><span class=\"ic\">✦<\u002Fspan> Generate<\u002Fbutton><\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">secondary · disabled<\u002Fspan><button class=\"ibtn\" disabled=\"\"><span class=\"ic\">✦<\u002Fspan> Generate<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CALLOUT -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Callouts<\u002Fstrong>\n        <p>Inline notice blocks. Use error for destructive/broken, info for capture/reference rails, neutral note for hints.<\u002Fp>\n        <p>→ <code>atoms/callout.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"flex-direction:column; align-items:stretch; max-width:360px\">\n        <div class=\"callout note\">Connect input nodes to begin.<\u002Fdiv>\n        <div class=\"callout info\">Capturing screenshot…<\u002Fdiv>\n        <div class=\"callout err\">Generation failed. Check your Model node.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SCORECARD BAR -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Scorecard bar<\u002Fstrong>\n        <p>Single-dimension evaluation readout. Threshold: <b>≥ 3.8 → success (sage)<\u002Fb>, <b>&lt; 3.8 → warning (amber)<\u002Fb>. Numeric on the right mirrors the bar color. Never accent.<\u002Fp>\n        <p>→ <code>atoms/scorecard-bar.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div style=\"max-width:360px; width:100%\">\n        <div class=\"sc bar-container\" style=\"border:1px solid var(--rule-soft); background: var(--raised)\">\n          <div class=\"bar\"><span class=\"n\">Clarity<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:86%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.3<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Hierarchy<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:80%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.0<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Triangulate<\u002Fspan><span class=\"b\"><span class=\"f warn\" style=\"width:72%\"><\u002Fspan><\u002Fspan><span class=\"v warn\">3.6<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Density<\u002Fspan><span class=\"b\"><span class=\"f warn\" style=\"width:64%\"><\u002Fspan><\u002Fspan><span class=\"v warn\">3.2<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ============================================================ -->\n  <!-- MOLECULES -->\n  <!-- ============================================================ -->\n  <section class=\"group\">\n    <h2 class=\"group-title\">Molecules<\u002Fh2>\n    <p class=\"group-note\">Small compositions that appear across multiple nodes. Specs in <code>molecules/<\u002Fcode>.<\u002Fp>\n\n    <!-- NODE SHELL -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>NodeShell<\u002Fstrong>\n        <p>The paper card every node lives inside. Border changes by status. Handles attach to the shell, not the header.<\u002Fp>\n        <p>→ <code>molecules/node-shell.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">filled<\u002Fspan>\n          <div class=\"node\" style=\"width:200px; height:80px; padding:12px; color:var(--ink-3); font-size:11px\">filled node<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">empty (dashed)<\u002Fspan>\n          <div class=\"node empty\" style=\"width:200px; height:80px; padding:12px; color:var(--ink-3); font-size:11px\">empty node<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">selected<\u002Fspan>\n          <div class=\"node selected\" style=\"width:200px; height:80px; padding:12px; color:var(--ink-3); font-size:11px\">selected<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">processing<\u002Fspan>\n          <div class=\"node processing\" style=\"width:200px; height:80px; padding:12px; color:var(--ink-3); font-size:11px\">processing…<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">error<\u002Fspan>\n          <div class=\"node error\" style=\"width:200px; height:80px; padding:12px; color:var(--ink-3); font-size:11px\">error<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NODE HEADER -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>NodeHeader<\u002Fstrong>\n        <p>Title · optional tag · delete X. Italic description below in muted tone. Optional \"optional\" tag for non-required facets.<\u002Fp>\n        <p>→ <code>molecules/node-header.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"node\" style=\"width:320px\">\n        <span class=\"handle t\"><\u002Fspan><span class=\"handle s\"><\u002Fspan>\n        <div class=\"n-head\">\n          <div class=\"tr\"><h3>Research Context<\u002Fh3><span class=\"opt\">optional<\u002Fspan><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv>\n          <p class=\"desc\">Qualitative + quantitative signals, prior work, user interviews.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SEG CONTROL -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Seg control<\u002Fstrong>\n        <p>Used for tabs inside Hypothesis, and for Thinking level on Model. Ink fill on active, muted text on inactive. Never brand color.<\u002Fp>\n        <p>→ <code>molecules/seg-control.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">hypothesis tabs<\u002Fspan>\n          <div class=\"seg\" style=\"width:260px\"><button class=\"on\">Hypothesis<\u002Fbutton><button>Why<\u002Fbutton><button>Measurements<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">thinking level<\u002Fspan>\n          <div class=\"seg\" style=\"width:200px\"><button>None<\u002Fbutton><button class=\"on\">Light<\u002Fbutton><button>Deep<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EVAL SCORECARD FULL -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>EvaluationScorecard<\u002Fstrong>\n        <p>Lives in VariantNode footer. Header shows \"Eval · pass\" or \"Eval · revise suggested\" + overall score. <b>Overall score color is threshold-driven, not brand<\u002Fb> — this is a delta vs. current codebase (which uses <code>text-accent<\u002Fcode>).<\u002Fp>\n        <p>→ <code>molecules/evaluation-scorecard.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sc\" style=\"max-width:440px; border:1px solid var(--rule-soft); background: var(--raised); border-radius: 8px\">\n        <div class=\"head\">\n          <span class=\"lbl\">Eval · pass<\u002Fspan>\n          <span class=\"num ok\">4.1<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"bar\"><span class=\"n\">Clarity<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:86%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.3<\u002Fspan><\u002Fdiv>\n        <div class=\"bar\"><span class=\"n\">Hierarchy<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:80%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.0<\u002Fspan><\u002Fdiv>\n        <div class=\"bar\"><span class=\"n\">Triangulate<\u002Fspan><span class=\"b\"><span class=\"f warn\" style=\"width:72%\"><\u002Fspan><\u002Fspan><span class=\"v warn\">3.6<\u002Fspan><\u002Fdiv>\n        <div class=\"bar\"><span class=\"n\">Density<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:82%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.1<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ============================================================ -->\n  <!-- ORGANISMS -->\n  <!-- ============================================================ -->\n  <section class=\"group\">\n    <h2 class=\"group-title\">Organisms<\u002Fh2>\n    <p class=\"group-note\">Full node compositions. One per spec in <code>organisms/<\u002Fcode>.<\u002Fp>\n\n    <!-- INPUT NODE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>InputNode<\u002Fstrong>\n        <p>Covers the 5 spec input types. Shows filled or empty state via handle color, border style, and (new) left-rail accent. Required fields with no content pulse on the target handle.<\u002Fp>\n        <p>→ <code>organisms/input-node.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">filled · required<\u002Fspan>\n          <div class=\"node filled-rail\" style=\"width:320px\">\n            <span class=\"handle s\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Design Brief<\u002Fh3><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">What are you designing, and for whom?<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\"><div class=\"ta\">Redesign the onboarding flow so first-time users reach the \"first value\" moment in under 90 seconds, across web and mobile.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">empty · required (warn)<\u002Fspan>\n          <div class=\"node warn-rail empty\" style=\"width:320px\">\n            <span class=\"handle s amber\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Design Brief<\u002Fh3><span class=\"chip warn\" style=\"margin-left:auto\">needs input<\u002Fspan><button class=\"xbtn\" style=\"margin-left:4px\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">What are you designing, and for whom?<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\"><div class=\"ta empty\">What do you want to design? e.g. \"Redesign the checkout flow…\"<\u002Fdiv>\n              <div style=\"display:flex; justify-content:flex-end; margin-top:8px; gap:6px; align-items:center;\">\n                <span style=\"font-size:10px; color:var(--ink-3);\">Add a Model node<\u002Fspan>\n                <button class=\"ibtn\" disabled=\"\"><span class=\"ic\">✦<\u002Fspan> Generate<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">filled · optional<\u002Fspan>\n          <div class=\"node filled-rail\" style=\"width:320px\">\n            <span class=\"handle s\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Research Context<\u002Fh3><span class=\"opt\">optional<\u002Fspan><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">Qualitative + quantitative signals.<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\"><div class=\"ta\">Mixpanel drop-off at step 2 (34%). Session replay shows password-confirm field causes the most confusion.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MODEL NODE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>ModelNode<\u002Fstrong>\n        <p>Provider, model, optional thinking level. \"Provider\" and \"Model\" field labels are tokenized — use <code>text-fg-muted<\u002Fcode>. Filled state when a model is selected.<\u002Fp>\n        <p>→ <code>organisms/model-node.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">configured<\u002Fspan>\n          <div class=\"node filled-rail\" style=\"width:320px\">\n            <span class=\"handle s\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Model<\u002Fh3><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">anthropic / claude-sonnet-4-5<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\" style=\"display:flex; flex-direction:column; gap:8px\">\n              <div><div style=\"font-size:10px; color:var(--ink-3); margin-bottom:3px;\">Provider<\u002Fdiv><div style=\"border:1px solid var(--rule); background:#fff; border-radius:4px; padding:5px 8px; font-size:11.5px; display:flex; justify-content:space-between;\">Anthropic <span style=\"color:var(--ink-4)\">▾<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; color:var(--ink-3); margin-bottom:3px;\">Model<\u002Fdiv><div style=\"border:1px solid var(--rule); background:#fff; border-radius:4px; padding:5px 8px; font-size:11.5px; display:flex; justify-content:space-between;\">Claude Sonnet 4.5 <span style=\"color:var(--ink-4)\">▾<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; color:var(--ink-3); margin-bottom:3px;\">Thinking<\u002Fdiv>\n                <div class=\"seg\"><button>None<\u002Fbutton><button class=\"on\">Light<\u002Fbutton><button>Deep<\u002Fbutton><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- INCUBATOR NODE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>IncubatorNode<\u002Fstrong>\n        <p>Intake uses diamond-shape handle (required). Shows \"N inputs connected\" and a count selector. Main action is ink-filled \"Generate\", not brand-colored.<\u002Fp>\n        <p>→ <code>organisms/incubator-node.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div class=\"state\"><span class=\"tag\">ready<\u002Fspan>\n          <div class=\"node\" style=\"width:320px\">\n            <span class=\"handle t diamond\"><\u002Fspan><span class=\"handle s\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Incubator<\u002Fh3><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">Synthesizes your inputs into differentiated hypothesis strategies.<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\" style=\"display:flex; flex-direction:column; gap:10px\">\n              <div style=\"display:flex; justify-content:space-between; font-size:10.5px; color: var(--ink-3)\"><span>4 inputs connected<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; font-size:11px; color: var(--ink-2)\"><label>New hypotheses<\u002Flabel>\n                <select style=\"border:1px solid var(--rule); border-radius:3px; background:var(--surface); padding:2px 6px; font-size:11px;\"><option>3<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <button class=\"ibtn primary\">Generate →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state\"><span class=\"tag\">empty · pulsing intake<\u002Fspan>\n          <div class=\"node empty\" style=\"width:320px\">\n            <span class=\"handle t amber diamond pulse\"><\u002Fspan><span class=\"handle s amber\"><\u002Fspan>\n            <div class=\"n-head\"><div class=\"tr\"><h3>Incubator<\u002Fh3><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><p class=\"desc\">Synthesizes your inputs into differentiated hypothesis strategies.<\u002Fp><\u002Fdiv>\n            <div class=\"n-body\" style=\"display:flex; flex-direction:column; gap:10px\">\n              <div style=\"display:flex; justify-content:space-between; font-size:10.5px; color: var(--ink-3)\"><span>0 inputs connected<\u002Fspan><\u002Fdiv>\n              <p style=\"text-align:center; font-size:10.5px; color:var(--ink-3); margin:0\">Connect input nodes to begin<\u002Fp>\n              <button class=\"ibtn primary\" disabled=\"\">Generate →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HYPOTHESIS NODE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>HypothesisNode<\u002Fstrong>\n        <p>Diamond target handle (model + incubator required). Tab group for Hypothesis / Why / Measurements. Auto-improve settings. \"Design\" is the primary button. Queued (selected) state gets accent border.<\u002Fp>\n        <p>→ <code>organisms/hypothesis-node.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"node selected\" style=\"width:320px\">\n        <span class=\"handle t diamond\"><\u002Fspan><span class=\"handle s\"><\u002Fspan>\n        <div class=\"n-head\"><div class=\"tr\"><h3>Structural Reveal<\u002Fh3><button class=\"xbtn\">✕<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"n-body\" style=\"display:flex; flex-direction:column; gap:8px\">\n          <div class=\"seg\"><button class=\"on\">Hypothesis<\u002Fbutton><button>Why<\u002Fbutton><button>Measurements<\u002Fbutton><\u002Fdiv>\n          <div class=\"ta\" style=\"min-height: 96px\">Surface the pipeline's next expected action above the fold, so users understand what \"running\" means at a glance.<\u002Fdiv>\n          <div style=\"border-top:1px solid var(--rule-soft); margin:4px -12px 0; padding: 10px 12px 0; display: flex; flex-direction:column; gap:8px\">\n            <div style=\"border:1px solid var(--rule-soft); border-radius:6px; padding: 6px 10px; background: color-mix(in srgb, var(--surface) 45%, transparent)\">\n              <label style=\"display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--ink-2); font-weight:500\">\n                <input type=\"checkbox\" checked=\"\" style=\"accent-color:var(--accent)\">Auto-improve\n              <\u002Flabel>\n              <div style=\"display:flex; align-items:center; gap:8px; margin-top:6px; padding-left:18px; font-size:10.5px; color:var(--ink-3)\">\n                <label>Max rounds<\u002Flabel>\n                <input type=\"number\" value=\"3\" style=\"width:42px; border:1px solid var(--rule); border-radius:3px; padding:2px 4px; font-size:10.5px\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"ibtn primary\">⚡ Design<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- VARIANT NODE -->\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>VariantNode<\u002Fstrong>\n        <p>Toolbar, preview body, evaluation scorecard, footer. Stack shadow indicates version history. \"Best\" marker uses accent; threshold colors on scorecard are sage/amber.<\u002Fp>\n        <p>→ <code>organisms/variant-node.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"node w-variant\" style=\"width:480px\">\n        <span class=\"handle t\"><\u002Fspan>\n        <div style=\"display:flex; align-items:center; gap:8px; padding: 8px 10px; border-bottom:1px solid var(--rule-soft);\">\n          <h3 style=\"margin:0; font-size:12px; flex:1\">Structural Reveal<\u002Fh3>\n          <span class=\"chip accent\">best<\u002Fspan>\n          <span style=\"font-family:var(--mono); font-size:10px; color:var(--ink-3)\">v3 / 3<\u002Fspan>\n          <button class=\"xbtn\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"height:160px; background: repeating-linear-gradient(45deg, var(--surface), var(--surface) 8px, var(--raised) 8px, var(--raised) 16px); display:flex; align-items:center; justify-content:center; color:var(--ink-3); font-size:11px; font-style:italic\">preview iframe<\u002Fdiv>\n        <div class=\"sc\">\n          <div class=\"head\">\n            <span class=\"lbl\">Eval · pass<\u002Fspan>\n            <span class=\"num ok\">4.1<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Clarity<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:86%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.3<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Hierarchy<\u002Fspan><span class=\"b\"><span class=\"f ok\" style=\"width:80%\"><\u002Fspan><\u002Fspan><span class=\"v ok\">4.0<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><span class=\"n\">Triangulate<\u002Fspan><span class=\"b\"><span class=\"f warn\" style=\"width:72%\"><\u002Fspan><\u002Fspan><span class=\"v warn\">3.6<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; padding: 7px 10px; border-top:1px solid var(--rule-soft); font-family: var(--mono); font-size: 10px; color: var(--ink-3)\">\n          <span>claude-sonnet-4-5<\u002Fspan><span>·<\u002Fspan><span>2.4k tok<\u002Fspan><span>·<\u002Fspan><span>14s<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ============================================================ -->\n  <!-- FLOW -->\n  <!-- ============================================================ -->\n  <section class=\"group\">\n    <h2 class=\"group-title\">Flow<\u002Fh2>\n    <p class=\"group-note\">How organisms wire together. Spec: <code>flows/canvas-flow.md<\u002Fcode>.<\u002Fp>\n\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Edge states<\u002Fstrong>\n        <p>React Flow edges use <code>--color-border<\u002Fcode> idle, <code>--color-accent<\u002Fcode> for processing (animated dashes), <code>--color-success<\u002Fcode> briefly on complete.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"width:100%\">\n        <div class=\"wire-demo\"><span style=\"font-family:var(--mono); font-size:10px; color:var(--ink-3); letter-spacing:1px\">IDLE<\u002Fspan><div class=\"wire-line\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"wire-demo\"><span style=\"font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:1px\">PROCESSING<\u002Fspan><div class=\"wire-line active\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n      <div class=\"lbl\"><strong>Anatomy<\u002Fstrong>\n        <p>Canvas graph shape. Spec inputs (5) + Design System fan into Incubator (diamond). Incubator fans out to N Hypothesis cards. Each Hypothesis + Model fans into K Variants.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"anatomy\">┌─────────────────┐\n│ Design Brief    │──┐\n└─────────────────┘  │\n┌─────────────────┐  │    ┌───────────┐       ┌────────────┐       ┌─────────┐\n│ Existing Design │──┼───▶│ Incubator │──────▶│ Hypothesis │──────▶│ Variant │\n└─────────────────┘  │    │   ◆       │       └────────────┘       └─────────┘\n┌─────────────────┐  │    └───────────┘             ▲\n│ Research        │──┤          ▲                   │\n└─────────────────┘  │          │                   │\n┌─────────────────┐  │     ┌────┴────┐         ┌────┴────┐\n│ Objectives      │──┤     │  Model  │─────────│  Model  │\n└─────────────────┘  │     └─────────┘         └─────────┘\n┌─────────────────┐  │\n│ Constraints     │──┘\n└─────────────────┘\n\nLegend:  ◆ diamond handle = required input   ──▶ source→target edge<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
